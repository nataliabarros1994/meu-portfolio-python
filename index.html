<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=./portfolio-minimalista.html">
    <meta name="description" content="Natália Barros — Desenvolvedora Full Stack. Python, Django, FastAPI, Next.js, TypeScript, React, Go, Node.js.">
    <meta name="keywords" content="Natália Barros, Desenvolvedora Full Stack, Python, Next.js, TypeScript, Go, Node.js">
    <title>Natália Barros — Desenvolvedora Full Stack</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Natália Barros — Desenvolvedora Full Stack">
    <meta property="og:description" content="Desenvolvedora Full Stack — Python, TypeScript, Go, Next.js e o que mais o problema pedir.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nataliabarros1994.github.io/meu-portfolio-python/">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0A0A0F;
            color: #F5F5F7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .loader-container {
            text-align: center;
            max-width: 600px;
        }

        .logo {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #7C3AED 0%, #06B6D4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(124, 58, 237, 0.15);
            border-top-color: #06B6D4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .redirect-link {
            color: #F5F5F7;
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid rgba(124, 58, 237, 0.5);
            background: rgba(124, 58, 237, 0.08);
            border-radius: 10px;
            display: inline-block;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .redirect-link:hover {
            background: linear-gradient(135deg, #7C3AED 0%, #06B6D4 100%);
            border-color: transparent;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .logo { font-size: 3rem; }
            h1 { font-size: 1.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="logo">NB</div>
        <h1>Natália Barros</h1>
        <p>Desenvolvedora Full Stack</p>
        <div class="spinner"></div>
        <p>Carregando portfolio...</p>
        <a href="./portfolio-minimalista.html" class="redirect-link">
            Clique aqui se não for redirecionado automaticamente
        </a>
    </div>

    <script>
        // Fallback redirect after 2 seconds
        setTimeout(function() {
            window.location.href = './portfolio-minimalista.html';
        }, 2000);
    </script>
</body>
</html>
